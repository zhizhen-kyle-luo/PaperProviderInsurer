<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phase 2 – Utilization Review Flowchart</title>
<style>
  body { margin: 0; padding: 30px; background: white; display: flex; justify-content: center; }
  svg { max-width: 100%; height: auto; }
</style>
</head>
<body>
<!--
  Coordinate reference:
    Clinical Package:     center (127, 149), rect x=20–235,   y=115–183  (215w × 68h)
    Insurer Adjudication: center (620, 149), rect x=488–753,  y=115–183  (265w × 68h)
    Synthesize:           center (955, 149), rect x=875–1035, y=115–183  (160w × 68h)
    Diamond:              center (214, 312), half-w=82, half-h=62
                          top(214,250) right(296,312) bottom(214,374) left(132,312)
    ABANDONED:            center (130, 472), rect x=50–210,   y=447–497
    MOD ACCEPTED:         center (310, 472), rect x=218–402,  y=447–497
    APPROVED:             center (620, 472), rect x=540–700,  y=447–497
    Green column:         x=0–450
    Blue column:          x=450–790
    Pink column:          x=790–1120 (width 330)
-->
<svg viewBox="0 0 1120 530" width="1232" height="583" xmlns="http://www.w3.org/2000/svg"
     font-family="Arial, Helvetica, sans-serif">
<defs>
  <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
    <path d="M0,0 L10,3.5 L0,7 Z" fill="#333"/>
  </marker>
</defs>

<rect width="1120" height="530" fill="white"/>

<!-- ── Phase chevrons ── -->
<path d="M2,2 L266,2 L281,22 L266,42 L2,42 Z"                fill="#cecece" stroke="#aaa" stroke-width="0.8"/>
<path d="M268,2 L532,2 L547,22 L532,42 L268,42 L283,22 Z"    fill="white"   stroke="#333" stroke-width="1.4"/>
<path d="M534,2 L798,2 L813,22 L798,42 L534,42 L549,22 Z"    fill="#cecece" stroke="#aaa" stroke-width="0.8"/>
<path d="M800,2 L1118,2 L1118,42 L800,42 L815,22 Z"          fill="#cecece" stroke="#aaa" stroke-width="0.8"/>

<text x="134" y="19" text-anchor="middle" font-size="13" fill="#555">Phase 1</text>
<text x="134" y="34" text-anchor="middle" font-size="11" fill="#555">(Load Case)</text>
<text x="400" y="19" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">Phase 2</text>
<text x="400" y="34" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">(Utilization Review)</text>
<text x="666" y="19" text-anchor="middle" font-size="13" fill="#555">Phase 3</text>
<text x="666" y="34" text-anchor="middle" font-size="11" fill="#555">(Claims Adjudication)</text>
<text x="955" y="19" text-anchor="middle" font-size="13" fill="#555">Phase 4</text>
<text x="955" y="34" text-anchor="middle" font-size="11" fill="#555">(Metrics)</text>

<!-- ── Column backgrounds ── -->
<rect x="0"   y="50" width="450" height="480" fill="#e6f4e6" opacity="0.55"/>
<rect x="450" y="50" width="340" height="480" fill="#daeaf8" opacity="0.60"/>
<rect x="790" y="50" width="330" height="480" fill="#f3e6f0" opacity="0.55"/>

<!-- ── Column headers ── -->
<text x="225"  y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Provider Agent</text>
<text x="620"  y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Insurer Agent</text>
<text x="955"  y="65" text-anchor="middle" font-size="15" font-weight="bold" fill="#222">Environment</text>

<!-- ══════════════════════════════════════════════
     NODES
     ══════════════════════════════════════════════ -->

<!-- Clinical Package: 215w × 68h, center x=127 -->
<rect x="20" y="115" width="215" height="68" rx="12" fill="white" stroke="#333" stroke-width="1.8"/>
<text x="127" y="139" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Clinical Package</text>
<text x="127" y="156" text-anchor="middle" font-size="11" fill="#444">(guidance + strategy +</text>
<text x="127" y="170" text-anchor="middle" font-size="11" fill="#444">EHR + request history)</text>

<!-- Insurer Adjudication: 265w × 68h, center x=620 (blue column center 620) -->
<rect x="488" y="115" width="265" height="68" rx="12" fill="white" stroke="#333" stroke-width="1.8"/>
<text x="620" y="139" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">Insurer Adjudication</text>
<text x="620" y="156" text-anchor="middle" font-size="11" fill="#444">(policy + strategy +</text>
<text x="620" y="170" text-anchor="middle" font-size="11" fill="#444">clinical evidence + review history)</text>

<!-- Synthesize Test Results: 160w × 68h, center x=955 (pink column center 955) -->
<rect x="875" y="115" width="160" height="68" rx="12" fill="white" stroke="#333" stroke-width="1.8"/>
<text x="955" y="145" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Synthesize</text>
<text x="955" y="164" text-anchor="middle" font-size="13" fill="#222">Test Results</text>

<!-- Provider Decision diamond  center(214,312) hw=82 hh=62 -->
<path d="M214,250 L296,312 L214,374 L132,312 Z" fill="white" stroke="#333" stroke-width="1.8"/>
<text x="214" y="308" text-anchor="middle" font-size="14" fill="#111">Provider</text>
<text x="214" y="325" text-anchor="middle" font-size="14" fill="#111">Decision</text>

<!-- ABANDONED -->
<rect x="50" y="447" width="160" height="55" rx="3" fill="#d2d2d2" stroke="#333" stroke-width="1.8"/>
<text x="130" y="469" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">ABANDONED</text>
<text x="130" y="488" text-anchor="middle" font-size="10" fill="#222">(No Treat / Treat Anyway)</text>

<!-- MODIFICATION ACCEPTED -->
<rect x="218" y="447" width="184" height="55" rx="3" fill="#d2d2d2" stroke="#333" stroke-width="1.8"/>
<text x="310" y="469" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">MODIFICATION</text>
<text x="310" y="488" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">ACCEPTED</text>

<!-- APPROVED: center x=620 (blue column center) -->
<rect x="540" y="447" width="160" height="55" rx="3" fill="#d2d2d2" stroke="#333" stroke-width="1.8"/>
<text x="620" y="481" text-anchor="middle" font-size="17" font-weight="bold" fill="#111">APPROVED</text>

<!-- ══════════════════════════════════════════════
     ARROWS
     ══════════════════════════════════════════════ -->

<!-- 1. Clinical Package → Insurer Adjudication -->
<line x1="235" y1="149" x2="488" y2="149" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="361" y="140" text-anchor="middle" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">submit request</text>

<!-- 2. Insurer Adjudication → Provider Decision  (modified — to top tip) -->
<line x1="488" y1="168" x2="215" y2="251" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="370" y="190" text-anchor="middle" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">modified</text>

<!-- 3. Insurer Adjudication → Provider Decision  (denied — upper-right edge midpoint) -->
<line x1="500" y1="183" x2="255" y2="281" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="400" y="232" text-anchor="middle" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">denied</text>

<!-- 4. Insurer Adjudication → Provider Decision  (pending_info* — to right tip) -->
<line x1="540" y1="183" x2="296" y2="312" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="445" y="262" text-anchor="middle" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">pending_info*</text>
<text x="445" y="276" text-anchor="middle" font-size="10" fill="#555" font-style="italic"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">*Not available at Level 2</text>

<!-- 5. Insurer Adjudication → APPROVED -->
<line x1="620" y1="183" x2="620" y2="447" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="635" y="322" text-anchor="start" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">approved</text>

<!-- 6. Insurer Adjudication → Synthesize Test Results -->
<line x1="753" y1="149" x2="875" y2="149" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="814" y="137" text-anchor="middle" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">if approved</text>
<text x="814" y="152" text-anchor="middle" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">diagnostic test</text>

<!-- 7. Synthesize → Clinical Package  (results added) -->
<path d="M955,115 L955,90 L127,90 L127,115" fill="none" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="541" y="83" text-anchor="middle" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">results added</text>

<!-- ── Three feedback loops ──
     Diamond: center(214,312), top(214,250), right(296,312), bottom(214,374), left(132,312)
     Clinical Package box bottom: y=183, left edge: x=20

     PROVIDE_DOCS: from left tip (132,312) → left to x=8 → straight up → lands at left-mid of box (20,149)
     APPEAL:       from upper-left edge midpoint ~(173,281) → straight up → lands at (173,183) bottom of box
                   label on LEFT side of arrow
     RESUBMIT:     from top tip (214,250) → straight up → lands at (214,183) bottom of box
                   label on RIGHT side of arrow
-->

<!-- PROVIDE_DOCS — diagonal from left tip of diamond to flat part of bottom edge (avoids rounded corner) -->
<line x1="132" y1="312" x2="100" y2="183" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="65" y="262" text-anchor="end" font-size="10.5" font-weight="bold" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">PROVIDE_DOCS</text>
<text x="65" y="275" text-anchor="end" font-size="9" fill="#555"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">(same level)</text>

<!-- APPEAL — from upper-left edge of diamond, straight up into box bottom -->
<line x1="173" y1="281" x2="173" y2="183" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="161" y="238" text-anchor="end" font-size="10.5" font-weight="bold" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">APPEAL</text>
<text x="161" y="251" text-anchor="end" font-size="9" fill="#555"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">(level + 1)</text>

<!-- RESUBMIT — from top tip, straight up into box bottom -->
<line x1="214" y1="250" x2="214" y2="183" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="226" y="226" text-anchor="start" font-size="10.5" font-weight="bold" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">RESUBMIT</text>
<text x="226" y="239" text-anchor="start" font-size="9" fill="#555"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">(level := 0)</text>

<!-- ABANDON — from bottom tip to ABANDONED box -->
<line x1="214" y1="374" x2="130" y2="447" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="158" y="407" text-anchor="middle" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">ABANDON</text>

<!-- ACCEPT_MODIFY — from bottom tip to MOD ACCEPTED box -->
<line x1="214" y1="374" x2="310" y2="447" stroke="#333" stroke-width="1.6" marker-end="url(#ah)"/>
<text x="285" y="407" text-anchor="start" font-size="13" fill="#222"
      style="paint-order:stroke fill" stroke="white" stroke-width="3" stroke-linejoin="round">ACCEPT_MODIFY</text>

</svg>
</body>
</html>
